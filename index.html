<!DOCTYPE html>
<html>
<head>
<title>JUS SEGAR</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #43cea2, #185a9d);
}

/* HEADER */
h1 {
    text-align: center;
    color: white;
    padding: 30px;
    font-size: 40px;
}

/* CARD */
.container {
    display: flex;
    gap: 30px;
    background: white;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 900px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.container:hover {
    transform: scale(1.02);
}

/* KIRI & KANAN */
.kiri, .kanan {
    width: 50%;
}

/* GAMBAR */
img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    background: linear-gradient(45deg, #00c853, #64dd17);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(45deg, #00e676, #76ff03);
    transform: scale(1.05);
}

/* TITLE */
h2 {
    color: #2e7d32;
}

/* LIST */
ul {
    padding-left: 20px;
}

li {
    margin-bottom: 8px;
}
</style>

</head>
<body>

<h1>🍹 MENU JUS SEGAR PREMIUM 🍹</h1>

<!-- TEMPLATE CARD -->
<div class="container">
<div class="kiri">
<h2>STROBERI</h2>
<img src="stroberijus.jpg">

<input id="nama7" type="text" placeholder="Nama kamu">
<input id="jumlah7" type="number" placeholder="Jumlah pesanan">
<textarea placeholder="Catatan tambahan..."></textarea>

<button onclick="pesan('Stroberi','nama7','jumlah7')">
Pesan Sekarang
</button>
</div>

<div class="kanan">
<h3>Manfaat</h3>
<ul>
<li>Meningkatkan Imunitas</li>
<li>Baik untuk otak</li>
<li>Menjaga kesehatan kulit</li>
</ul>
</div>
</div>

<script>
function pesan(jus, idNama, idJumlah) {
    let nama = document.getElementById(idNama).value;
    let jumlah = document.getElementById(idJumlah).value;

    if(nama === "" || jumlah === "") {
        alert("Isi nama & jumlah dulu bro!");
        return;
    }

    let pesanText = "Halo, saya mau pesan jus " + jus +
                    "%0ANama: " + nama +
                    "%0AJumlah: " + jumlah;

    let url = "https://wa.me/6289682026605?text=" + pesanText;

    window.location.href = url;
}
</script>

</body>
</html>
